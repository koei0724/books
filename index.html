<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나의 디지털 책꽂이</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1a1a'/%3E%3Cpath d='M9 7h14v18H11a2 2 0 0 1-2-2V7Z' fill='%23fff'/%3E%3Cpath d='M13 11h6M13 15h5M13 19h4' stroke='%231a1a1a' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-bar">
      <button class="icon-button app-icon" type="button" aria-label="메뉴">
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>
      <a class="app-title" href="#shelf">나의 서재</a>
      <div class="auth-controls">
        <span id="auth-user" class="auth-user" hidden></span>
        <a id="login-link" class="auth-button" href="/api/auth/kakao/login">로그인</a>
        <button id="logout-button" class="auth-button" type="button" hidden>로그아웃</button>
      </div>
    </header>

    <main class="app-shell">
      <section class="top-panel" aria-labelledby="page-title">
        <div class="title-block">
          <p id="page-eyebrow" class="eyebrow">Library</p>
          <h1 id="page-title">내 서재</h1>
          <p id="page-summary" class="page-summary">읽고 있는 책과 독서 기록을 한곳에서 관리합니다.</p>
        </div>

        <nav class="page-switch" aria-label="서재 페이지 이동">
          <a class="route-tab" href="#shelf" data-route-link="shelf">
            <span class="material-symbols-outlined" aria-hidden="true">local_library</span>
            <span>내 서재</span>
          </a>
          <a class="route-tab" href="#search" data-route-link="search">
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
            <span>책 찾기</span>
          </a>
        </nav>
      </section>

      <section class="page-view" data-page="shelf" aria-label="내 서재">
        <section class="shelf-panel" aria-labelledby="shelf-heading">
          <div class="panel-heading">
            <div>
              <p class="section-label">Library</p>
              <h2 id="shelf-heading">읽고 있는 책</h2>
            </div>
            <span id="shelf-count" class="count-label">0권</span>
          </div>
          <div id="shelf-grid" class="shelf-grid" aria-live="polite"></div>
          <div id="empty-shelf" class="empty-state">
            <p>아직 꽂힌 책이 없습니다.</p>
            <a class="text-link" href="#search">책 찾으러 가기</a>
          </div>
        </section>
      </section>

      <section class="page-view search-page" data-page="search" aria-label="책 찾기" hidden>
        <div class="search-page-layout">
          <section class="search-panel" aria-label="책 검색">
            <form class="search-box" id="search-form" autocomplete="off">
              <span class="material-symbols-outlined search-symbol" aria-hidden="true">search</span>
              <label class="sr-only" for="search-input">책 검색</label>
              <input
                id="search-input"
                name="query"
                type="search"
                placeholder="책 제목, 작가, 교보문고 URL"
                spellcheck="false"
              />
              <button type="submit">검색</button>
            </form>
            <div class="search-meta">
              <div id="status-line" class="status-line"></div>
              <span id="search-count" class="count-label">0권</span>
            </div>
            <div id="results-list" class="results-list" aria-live="polite"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog id="book-dialog" class="book-dialog">
      <form method="dialog" class="dialog-frame" id="book-form">
        <div class="dialog-toolbar">
          <button class="toolbar-button" type="button" data-dialog-close aria-label="닫기">
            <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            <span>뒤로</span>
          </button>
          <p class="dialog-bar-title">나의 서재</p>
          <button class="icon-button" type="button" data-dialog-close aria-label="닫기">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>

        <div class="dialog-layout">
          <section class="detail-hero" aria-labelledby="detail-title">
            <div id="detail-cover-wrap" class="detail-cover-wrap"></div>
            <p id="detail-author" class="detail-author"></p>
            <h2 id="detail-title" class="detail-title"></h2>
            <p id="detail-meta" class="detail-meta"></p>

            <dl class="detail-stats" aria-label="독서 기록 요약">
              <div>
                <dt>출간</dt>
                <dd id="detail-year">-</dd>
              </div>
              <div>
                <dt>읽은 기록</dt>
                <dd id="detail-read-state">미기록</dd>
              </div>
              <div>
                <dt>독서 기록</dt>
                <dd id="detail-review-state">0자</dd>
              </div>
            </dl>
          </section>

          <section class="journal-panel" aria-labelledby="journal-heading">
            <div class="journal-heading">
              <div>
                <p class="section-label">Reading Journal</p>
                <h3 id="journal-heading">독서 노트</h3>
              </div>
              <span id="detail-note-count" class="journal-count">0자</span>
            </div>

            <label class="check-field">
              <input id="reading-now" type="checkbox" />
              <span>읽는 중</span>
            </label>

            <fieldset class="date-field">
              <legend>읽은 날짜</legend>
              <div class="date-choice">
                <input id="read-date" type="date" />
                <label class="date-unknown-option">
                  <input id="read-date-unknown" type="checkbox" />
                  <span>날짜가 기억나지 않아요</span>
                </label>
              </div>
            </fieldset>

            <label class="field">
              <span>독서 기록</span>
              <textarea id="review-text" rows="10" placeholder="책을 읽고 남기고 싶은 생각을 적어두세요."></textarea>
            </label>

            <div class="dialog-actions">
              <button id="delete-book" class="secondary-button danger" type="button">삭제</button>
              <button id="save-book" class="primary-button" value="save" type="submit">저장</button>
            </div>
          </section>
        </div>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
